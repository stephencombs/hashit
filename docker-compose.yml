services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hashit
      POSTGRES_USER: hashit
      POSTGRES_PASSWORD: hashit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hashit -d hashit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
