services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hashit
      POSTGRES_USER: hashit
      POSTGRES_PASSWORD: hashit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hashit -d hashit"]
      interval: 5s
      timeout: 5s
      retries: 5

  openobserve:
    image: openobserve/openobserve:latest
    restart: unless-stopped
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_USER_EMAIL:-root@example.com}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_USER_PASSWORD:-openobserve-dev-password}
    ports:
      - "5080:5080"
    volumes:
      - openobserve_data:/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    restart: unless-stopped
    command:
      - "azurite-blob"
      - "--blobHost"
      - "0.0.0.0"
      - "--blobPort"
      - "10000"
      - "--location"
      - "/data"
      - "--skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data

volumes:
  postgres_data:
  openobserve_data:
  azurite_data:
